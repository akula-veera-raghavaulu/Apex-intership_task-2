<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Task Manager</title>


    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="task_2.css">

    <style>
        .navbar p{
            font-family: "Noto Sans Telugu", sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin: 0;
        }
    </style>
</head>

<body>

    <nav class="navbar">

        <p>నా వెబ్సైట్</p>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Tasks</a></li>
        </ul>

    </nav>

    <div class="container">

        <!-- Contact Form -->
        <section class="card">

            <h2>Contact Form</h2>

            <form id="contactForm">

                <input type="text" id="name" placeholder="Your Name">
                <span class="error" id="nameError"></span>

                <input type="email" id="email" placeholder="Your Email">
                <span class="error" id="emailError"></span>

                <input type="tel" id="phone" placeholder="Your Phone Number">
                <span class="error" id="phoneError"></span>

                <div class="gender-group">

                    <label>Gender</label>

                    <div class="gender-options">

                        <label>
                            <input type="radio" name="gender" value="Male">
                            Male
                        </label>

                        <label>
                            <input type="radio" name="gender" value="Female">
                            Female
                        </label>

                    </div>

                    <span class="error" id="genderError"></span>

                </div>

                <textarea id="message" placeholder="Your Message"></textarea>
                <span class="error" id="messageError"></span>

                <button type="submit">Send Message</button>

            </form>

        </section>

        <!-- To-Do List -->
        <section class="card">

            <h2>To-Do List</h2>

            <div class="todo-input">
                <input type="text" id="taskInput" placeholder="Enter a task...">
                <button type="button" onclick="addTask()">Add</button>
            </div>

            <ul id="taskList"></ul>

        </section>

    </div>

    <script src="task_2.js"></script>

</body>
</html>
